{% extends 'base.html' %}

{% block content %}

<h3>Employee Dashboard</h3>

<a href="/add/" class="btn btn-success mb-3">Add Employee</a>

<table class="table table-bordered">

<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>

{% for emp in employees %}

<tr>

<td>{{emp.id}}</td>
<td>{{emp.name}}</td>
<td>{{emp.email}}</td>
<td>{{emp.phone}}</td>
<td>{{emp.department}}</td>
<td>{{emp.salary}}</td>

<td>

<a href="/edit/{{emp.id}}" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete/{{emp.id}}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
