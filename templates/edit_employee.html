<!DOCTYPE html>
<html>
<head>

<title>Edit Employee</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-warning text-dark">
<h4>Edit Employee</h4>
</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" name="name" value="{{emp.name}}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" name="email" value="{{emp.email}}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Phone</label>
<input type="text" name="phone" value="{{emp.phone}}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Department</label>
<input type="text" name="department" value="{{emp.department}}" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Salary</label>
<input type="number" name="salary" value="{{emp.salary}}" class="form-control">
</div>

</div>

<button class="btn btn-primary">Update Employee</button>

<a href="/dashboard/" class="btn btn-secondary">Back</a>

</form>

</div>

</div>

</div>

</body>
</html>
